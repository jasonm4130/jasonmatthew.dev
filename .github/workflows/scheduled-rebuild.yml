name: Scheduled Rebuild

on:
  schedule:
    # Run daily at 8 AM AEST (10 PM UTC previous day)
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: curl -s -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
