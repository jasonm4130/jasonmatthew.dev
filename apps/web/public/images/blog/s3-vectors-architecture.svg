<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Conversational Search production query path</title>
  <desc>Architecture diagram showing the query flow from User through Cloudflare Workers and Durable Objects to AWS Bedrock for inference and S3 Vectors for retrieval, with async writes to DynamoDB.</desc>

  <!-- Card background — matches matplotlib SVG aesthetic (gray-900) -->
  <rect width="760" height="480" rx="8" fill="#111827"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e5e7eb"/>
    </marker>
    <marker id="arrowhead-async" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" fill="#f3f4f6" font-size="16" font-weight="700">Conversational Search — production query path</text>

  <!-- User -->
  <g>
    <rect x="30" y="220" width="100" height="60" rx="6" fill="#1f2937" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="80" y="256" text-anchor="middle" fill="#f3f4f6" font-size="14" font-weight="600">User</text>
  </g>

  <!-- Cloudflare layer container -->
  <g>
    <rect x="200" y="170" width="240" height="160" rx="8" fill="#27170c" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="195" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" letter-spacing="1.2">CLOUDFLARE</text>

    <rect x="220" y="210" width="200" height="42" rx="5" fill="#1f2937" stroke="#6b7280" stroke-width="1"/>
    <text x="320" y="232" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="600">Workers</text>
    <text x="320" y="246" text-anchor="middle" fill="#9ca3af" font-size="11">Edge request handling</text>

    <rect x="220" y="262" width="200" height="52" rx="5" fill="#1f2937" stroke="#6b7280" stroke-width="1"/>
    <text x="320" y="284" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="600">Durable Objects</text>
    <text x="320" y="300" text-anchor="middle" fill="#9ca3af" font-size="11">Pipeline orchestration · 4 stages</text>
  </g>

  <!-- Bedrock -->
  <g>
    <rect x="540" y="80" width="200" height="70" rx="6" fill="#1f2937" stroke="#facc15" stroke-width="1.5"/>
    <text x="640" y="106" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">AWS Bedrock</text>
    <text x="640" y="124" text-anchor="middle" fill="#9ca3af" font-size="11">Question rewrite · generation</text>
    <text x="640" y="138" text-anchor="middle" fill="#9ca3af" font-size="11">· validation</text>
  </g>

  <!-- S3 Vectors -->
  <g>
    <rect x="540" y="220" width="200" height="60" rx="6" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="640" y="246" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">S3 Vectors</text>
    <text x="640" y="264" text-anchor="middle" fill="#9ca3af" font-size="11">Per-tenant retrieval · billions / index</text>
  </g>

  <!-- DynamoDB -->
  <g>
    <rect x="540" y="350" width="200" height="60" rx="6" fill="#1f2937" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="640" y="376" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">DynamoDB</text>
    <text x="640" y="394" text-anchor="middle" fill="#9ca3af" font-size="11">Async state · metrics</text>
  </g>

  <!-- Arrows -->
  <line x1="130" y1="250" x2="198" y2="250" stroke="#e5e7eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 442 230 C 480 230, 510 130, 538 115" stroke="#e5e7eb" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <line x1="442" y1="250" x2="538" y2="250" stroke="#e5e7eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 442 290 C 480 290, 510 360, 538 380" stroke="#9ca3af" stroke-width="2" fill="none" stroke-dasharray="6 3" marker-end="url(#arrowhead-async)"/>

  <!-- Legend -->
  <g transform="translate(30, 440)">
    <line x1="0" y1="10" x2="36" y2="10" stroke="#e5e7eb" stroke-width="2"/>
    <text x="44" y="14" fill="#9ca3af" font-size="12">Sync request</text>
    <line x1="160" y1="10" x2="196" y2="10" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 3"/>
    <text x="204" y="14" fill="#9ca3af" font-size="12">Async write</text>
  </g>
</svg>
